name: Deploy cPanel (FTP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and FTP upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_VERSION: 20
      LOCAL_DIST_DIR: ./dist/
      REMOTE_TARGET_DIR: ./public_html/personelmedisa/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate SPA rewrite file
        run: |
          test -f dist/.htaccess || (echo "dist/.htaccess missing. SPA routes will 404." && exit 1)

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER secret is missing." && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME secret is missing." && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD secret is missing." && exit 1)
          test -n "$FTP_PORT" || (echo "FTP_PORT secret is missing." && exit 1)

      - name: Upload dist to cPanel public_html/personelmedisa
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: ${{ secrets.FTP_PORT }}
          local-dir: ${{ env.LOCAL_DIST_DIR }}
          server-dir: ${{ env.REMOTE_TARGET_DIR }}
          dangerous-clean-slate: true
