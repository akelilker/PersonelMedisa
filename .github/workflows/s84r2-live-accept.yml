name: S84-R2 Live Accept

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "ACCEPT_S84R2_READONLY | CLEANUP_S84R2"
        required: true
        type: string

jobs:
  accept:
    name: Migrate 035 + dry-run accept (no HARIC write)
    if: >-
      github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY' ||
      github.event.inputs.confirm == 'CLEANUP_S84R2'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        if: github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY'
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        if: github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY'
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          MIG_SHA="$(sha256sum api/migrations/035_personel_bordro_kapsamlari.sql | awk '{print $1}')"
          export TOKEN MIG_SHA
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "migration_sha=$MIG_SHA" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s84r2-ops /tmp/s84r2-artifacts
          cp api/migrations/035_personel_bordro_kapsamlari.sql /tmp/s84r2-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s84r2-live-accept.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          mig = os.environ['MIG_SHA']
          if src.count('REPLACE_S84R2_ACCEPT_TOKEN') != 1:
              raise SystemExit('token placeholder count mismatch')
          if src.count('REPLACE_S84R2_MIGRATION_SHA256') != 1:
              raise SystemExit('migration sha placeholder count mismatch')
          out = src.replace('REPLACE_S84R2_ACCEPT_TOKEN', token, 1).replace('REPLACE_S84R2_MIGRATION_SHA256', mig, 1)
          Path('/tmp/s84r2-ops/_s84r2_accept.php').write_text(out, encoding='utf-8', newline='\n')
          print('payload_ok')
          PY
          if head -c 3 /tmp/s84r2-ops/_s84r2_accept.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S84R2_ACCEPT_TOKEN" /tmp/s84r2-ops/_s84r2_accept.php
          grep -q "$TOKEN" /tmp/s84r2-ops/_s84r2_accept.php
          grep -q "$MIG_SHA" /tmp/s84r2-ops/_s84r2_accept.php
          echo "$MIG_SHA" | tee /tmp/s84r2-artifacts/migration-sha256.txt

      - name: Upload ops files via FTP
        if: github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s84r2-ops;
              put -O api/public _s84r2_accept.php;
              put -O api/public 035_personel_bordro_kapsamlari.sql;
              bye
            "
          }
          upload true || upload false

      - name: Identity + preflight + backup + migrate + dry-run
        if: github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s84r2_accept.php"
          for action in identity preflight backup migrate dry_run integrity; do
            echo "==== action=$action ===="
            code=$(curl -sS -o "/tmp/s84r2-artifacts/${action}.json" -w "%{http_code}" "${BASE}?token=${TOKEN}&action=${action}" || true)
            echo "http=$code"
            cat "/tmp/s84r2-artifacts/${action}.json"
            echo
            test "$code" = "200"
            python3 - <<PY
          import json,sys
          data=json.load(open('/tmp/s84r2-artifacts/${action}.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','write_performed','already_applied','expectations') if k in data or True}, indent=2, default=str)[:4000])
          if not data.get('ok'):
            sys.exit(1)
          PY
          done
          if [ -f /tmp/s84r2-artifacts/backup.json ]; then
            curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o /tmp/s84r2-artifacts/karmotor_medisa_pre_s84r2_035.sql || true
          fi

      - name: Upload artifacts
        if: always() && github.event.inputs.confirm == 'ACCEPT_S84R2_READONLY'
        uses: actions/upload-artifact@v4
        with:
          name: s84r2-live-accept
          path: /tmp/s84r2-artifacts
          if-no-files-found: warn

      - name: Delete ops files via FTP
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lftp
          cleanup() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              rm -f api/public/_s84r2_accept.php;
              rm -f api/public/035_personel_bordro_kapsamlari.sql;
              rm -f api/public/_s84r2_backup_tmp.sql;
              bye
            "
          }
          cleanup true || cleanup false
          echo "ops cleanup done"
