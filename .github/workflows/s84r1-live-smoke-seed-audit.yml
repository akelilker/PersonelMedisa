name: S84-R1 Live Smoke Seed Audit

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "ACCEPT_S84R1_READONLY | CLEANUP_S84R1"
        required: true
        type: string

jobs:
  audit:
    name: Read-only smoke-seed production audit
    if: >
      github.event.inputs.confirm == 'ACCEPT_S84R1_READONLY' ||
      github.event.inputs.confirm == 'CLEANUP_S84R1'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        id: prep
        if: github.event.inputs.confirm == 'ACCEPT_S84R1_READONLY'
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s84r1-ops /tmp/s84r1-artifacts
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s84r1-live-smoke-seed-audit.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S84R1_AUDIT_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S84R1_AUDIT_TOKEN')}")
          out = src.replace('REPLACE_S84R1_AUDIT_TOKEN', token, 1)
          Path('/tmp/s84r1-ops/_s84r1_audit.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s84r1-ops/_s84r1_audit.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S84R1_AUDIT_TOKEN" /tmp/s84r1-ops/_s84r1_audit.php
          grep -q "$TOKEN" /tmp/s84r1-ops/_s84r1_audit.php
          ls -la /tmp/s84r1-ops

      - name: Upload ops file via FTP
        if: github.event.inputs.confirm == 'ACCEPT_S84R1_READONLY'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s84r1-ops;
              put -O api/public _s84r1_audit.php;
              bye
            "
          }
          upload true || upload false

      - name: Identity + audit
        if: github.event.inputs.confirm == 'ACCEPT_S84R1_READONLY'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s84r1_audit.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=identity" | tee /tmp/s84r1-artifacts/identity.json
          python3 - <<'PY'
          import json
          data=json.load(open('/tmp/s84r1-artifacts/identity.json'))
          assert data.get('ok') and data.get('code')=='PRODUCTION_DB_IDENTITY_OK', data
          print('identity_ok', data['identity']['aktif_veritabani'])
          PY
          HTTP_CODE=$(curl -sS -o /tmp/s84r1-artifacts/audit.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=audit")
          echo "audit_http=${HTTP_CODE}"
          head -c 4000 /tmp/s84r1-artifacts/audit.json; echo
          test "${HTTP_CODE}" = "200"
          python3 - <<'PY'
          import json, pathlib
          data=json.load(open('/tmp/s84r1-artifacts/audit.json'))
          assert data.get('ok') and data.get('code')=='S84R1_SMOKE_SEED_AUDIT_READONLY_OK', data
          assert data.get('write_performed') is False
          out=pathlib.Path('/tmp/s84r1-artifacts/packages')
          out.mkdir(parents=True, exist_ok=True)
          for name, csv in (data.get('packages') or {}).items():
              (out / name).write_text(csv, encoding='utf-8', newline='\n')
          summary={
            'phase': data.get('phase'),
            's84_status_unchanged': data.get('s84_status_unchanged'),
            'write_performed': data.get('write_performed'),
            'counts': data.get('counts'),
            'owner_notes': data.get('owner_notes'),
            'next_gate': data.get('next_gate'),
            'candidate_decision': data.get('candidate_decision'),
            'candidates': [
              {
                'personel_id': c.get('personel_id'),
                'sicil_no': c.get('sicil_no'),
                'ad_soyad': c.get('ad_soyad'),
                'aktif_durum': c.get('aktif_durum'),
                'sube_id': c.get('sube_id'),
                'sube_adi': c.get('sube_adi'),
                'departman_adi': c.get('departman_adi'),
                'ise_giris_tarihi': c.get('ise_giris_tarihi'),
                'tc_mask': c.get('tc_mask'),
                'seed_profile': c.get('seed_profile'),
                'classification': c.get('classification'),
                'classification_reason': c.get('classification_reason'),
                'evidence': c.get('evidence'),
                'relations': c.get('relations'),
                'snapshots': [
                  {
                    'snapshot_id': s.get('snapshot_id'),
                    'yil': s.get('yil'),
                    'ay': s.get('ay'),
                    'revision_no': s.get('revision_no'),
                    'state': s.get('state'),
                    'snapshot_hash': s.get('snapshot_hash'),
                    'sube_id': s.get('sube_id'),
                  } for s in (c.get('snapshots') or [])
                ],
                's81_period_notes': c.get('s81_period_notes'),
                'real_person_match_confirmed': c.get('real_person_match_confirmed'),
              } for c in (data.get('candidates') or [])
            ],
            'identity': data.get('identity'),
          }
          pathlib.Path('/tmp/s84r1-artifacts/summary.json').write_text(
            json.dumps(summary, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          slim=dict(data)
          slim['packages']={k: f'{len(v)} bytes' for k,v in (data.get('packages') or {}).items()}
          pathlib.Path('/tmp/s84r1-artifacts/audit-slim.json').write_text(
            json.dumps(slim, ensure_ascii=False, indent=2), encoding='utf-8'
          )
          print('audit_ok', summary['counts'])
          PY

      - name: Upload artifacts
        if: github.event.inputs.confirm == 'ACCEPT_S84R1_READONLY'
        uses: actions/upload-artifact@v4
        with:
          name: s84r1-smoke-seed-audit
          path: |
            /tmp/s84r1-artifacts/summary.json
            /tmp/s84r1-artifacts/audit-slim.json
            /tmp/s84r1-artifacts/identity.json
            /tmp/s84r1-artifacts/packages/
          if-no-files-found: error

      - name: Cleanup ops file via FTP
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s84r1_audit.php;
              bye
            "
          }
          cleanup true || cleanup false
          echo "cleanup_attempted"
