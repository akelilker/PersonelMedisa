name: S85-B Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "PREFLIGHT_BACKUP_S85B | MIGRATE_S85B_036_037 | CLEANUP_S85B"
        required: true
        type: string

jobs:
  migrate:
    name: S85-B live backup/migrate via temporary FTP ops
    if: >-
      github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S85B' ||
      github.event.inputs.confirm == 'MIGRATE_S85B_036_037' ||
      github.event.inputs.confirm == 'CLEANUP_S85B'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Fetch S85-B migration SQL from feature branch
        if: github.event.inputs.confirm != 'CLEANUP_S85B'
        run: |
          set -euo pipefail
          git fetch origin feat/s85b-sgk-prim-gunu-owner
          git checkout origin/feat/s85b-sgk-prim-gunu-owner -- \
            api/migrations/036_sgk_prim_gunu_owner.sql \
            api/migrations/037_sgk_resmi_kaynak_manifesti_v1.sql
          test -f api/migrations/036_sgk_prim_gunu_owner.sql
          test -f api/migrations/037_sgk_resmi_kaynak_manifesti_v1.sql
          sha256sum api/migrations/036_sgk_prim_gunu_owner.sql api/migrations/037_sgk_resmi_kaynak_manifesti_v1.sql

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        if: github.event.inputs.confirm != 'CLEANUP_S85B'
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s85b-ops /tmp/s85b-artifacts
          cp api/migrations/036_sgk_prim_gunu_owner.sql /tmp/s85b-ops/
          cp api/migrations/037_sgk_resmi_kaynak_manifesti_v1.sql /tmp/s85b-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s85b-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S85B_MIGRATE_TOKEN') != 1:
              raise SystemExit('expected exactly 1 REPLACE placeholder')
          out = src.replace('REPLACE_S85B_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s85b-ops/_s85b_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s85b-ops/_s85b_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S85B_MIGRATE_TOKEN" /tmp/s85b-ops/_s85b_migrate.php
          sha256sum api/migrations/036_sgk_prim_gunu_owner.sql api/migrations/037_sgk_resmi_kaynak_manifesti_v1.sql | tee /tmp/s85b-artifacts/migration-sha256.txt
          ls -la /tmp/s85b-ops

      - name: Upload ops files via FTP
        if: github.event.inputs.confirm != 'CLEANUP_S85B'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s85b-ops;
              put -O api/public _s85b_migrate.php;
              put -O api/public 036_sgk_prim_gunu_owner.sql;
              put -O api/public 037_sgk_resmi_kaynak_manifesti_v1.sql;
              bye
            "
          }
          upload true || upload false

      - name: Identity + preflight
        if: github.event.inputs.confirm != 'CLEANUP_S85B'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s85b_migrate.php"
          code=$(curl -sS -o /tmp/s85b-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s85b-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s85b-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s85b-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s85b-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s85b-artifacts/preflight.json'))
          print(json.dumps({'ok': data.get('ok'), 'code': data.get('code')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          if data.get('code') == 'S85B_PREFLIGHT_PARTIAL_036_TRACE':
            sys.exit(2)
          PY

      - name: Backup + download
        if: github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S85B' || github.event.inputs.confirm == 'MIGRATE_S85B_036_037'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s85b_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s85b-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s85b-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          name=(data.get('backup') or {}).get('file') or 'karmotor_medisa_pre_s85b.sql'
          open('/tmp/s85b-artifacts/backup_filename.txt','w').write(name)
          PY
          FNAME="$(cat /tmp/s85b-artifacts/backup_filename.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s85b-artifacts/${FNAME}"
          ls -la "/tmp/s85b-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib
          p=Path('/tmp/s85b-artifacts')/Path(open('/tmp/s85b-artifacts/backup_filename.txt').read().strip())
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          assert 'CREATE TABLE' in text
          assert 'INSERT INTO' in text
          assert ('COMMIT' in text) or ('Dump completed' in text)
          h=hashlib.sha256(p.read_bytes()).hexdigest()
          print('backup local verify OK bytes', p.stat().st_size, 'sha256', h)
          open('/tmp/s85b-artifacts/backup_sha256.txt','w').write(h)
          PY

      - name: Apply 036/037
        if: github.event.inputs.confirm == 'MIGRATE_S85B_036_037'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s85b_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=migrate" | tee /tmp/s85b-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s85b-artifacts/migrate.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s85b-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s85b-artifacts/postcheck.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY

      - name: Delete ops files via FTP
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s85b_migrate.php;
              rm -f 036_sgk_prim_gunu_owner.sql;
              rm -f 037_sgk_resmi_kaynak_manifesti_v1.sql;
              rm -f s85b_latest_backup_path.txt;
              bye
            "
          }
          if [ "${{ github.event.inputs.confirm }}" = "CLEANUP_S85B" ] || [ "${{ github.event.inputs.confirm }}" = "PREFLIGHT_BACKUP_S85B" ] || [ "${{ github.event.inputs.confirm }}" = "MIGRATE_S85B_036_037" ]; then
            cleanup true || cleanup false
          fi
          for mode in true false; do
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_s85b_*.sql;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s85b_migrate.php" || true)
          echo "post-delete HTTP=$code"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s85b-live-schema-migrate
          path: /tmp/s85b-artifacts
          if-no-files-found: warn
