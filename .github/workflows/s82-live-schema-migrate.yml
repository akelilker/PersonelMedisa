name: S82 Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'MIGRATE_S82_033_034 | ACCEPT_S82_READONLY | CLEANUP_S82'
        required: true
        type: string
  push:
    branches:
      - main
    paths:
      - 'scripts/s82-live-migrate.php'

jobs:
  migrate:
    name: Preflight + backup + apply 033/034 + read-only acceptance
    if: >
      github.event_name == 'push' ||
      github.event.inputs.confirm == 'MIGRATE_S82_033_034' ||
      github.event.inputs.confirm == 'ACCEPT_S82_READONLY' ||
      github.event.inputs.confirm == 'CLEANUP_S82'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s82-ops /tmp/s82-artifacts
          cp api/migrations/033_sirket_calisma_politikalari.sql /tmp/s82-ops/
          cp api/migrations/034_bordro_onay_ve_projection.sql /tmp/s82-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s82-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S82_MIGRATE_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S82_MIGRATE_TOKEN')}")
          out = src.replace('REPLACE_S82_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s82-ops/_s82_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s82-ops/_s82_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S82_MIGRATE_TOKEN" /tmp/s82-ops/_s82_migrate.php
          grep -q "$TOKEN" /tmp/s82-ops/_s82_migrate.php
          sha256sum api/migrations/033_sirket_calisma_politikalari.sql api/migrations/034_bordro_onay_ve_projection.sql | tee /tmp/s82-artifacts/migration-sha256.txt
          ls -la /tmp/s82-ops

      - name: Upload ops files via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local mode_name="$1"
            local use_ftps="$2"
            echo "FTP upload mode: ${mode_name}"
            timeout 90s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set cmd:verbose on;
              set net:max-retries 3;
              set net:timeout 20;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s82-ops;
              put -O api/public _s82_migrate.php;
              put -O api/public 033_sirket_calisma_politikalari.sql;
              put -O api/public 034_bordro_onay_ve_projection.sql;
              bye
            "
          }
          upload "plain-ftp" false || upload "explicit-ftps" true

      - name: Identity + preflight
        if: github.event_name != 'push' && github.event.inputs.confirm == 'MIGRATE_S82_033_034'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s82_migrate.php"
          code=$(curl -sS -o /tmp/s82-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s82-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'PRODUCTION_DB_IDENTITY_OK':
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s82-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s82-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'already_applied': data.get('already_applied'),
            'schema': data.get('schema'),
          }, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          if data.get('code') not in ('S82_PREFLIGHT_OK', 'S82_SCHEMA_ALREADY_APPLIED'):
            sys.exit(1)
          open('/tmp/s82-artifacts/already_applied.txt','w').write('1' if data.get('already_applied') else '0')
          PY

      - name: Backup
        if: github.event_name != 'push' && github.event.inputs.confirm == 'MIGRATE_S82_033_034'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s82_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s82-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup')}, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_BACKUP_OK':
            sys.exit(1)
          name=(data.get('backup') or {}).get('file') or 'karmotor_medisa_pre_s82.sql'
          open('/tmp/s82-artifacts/backup_filename.txt','w').write(name)
          PY
          FNAME="$(cat /tmp/s82-artifacts/backup_filename.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s82-artifacts/${FNAME}"
          ls -la "/tmp/s82-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib
          p=Path('/tmp/s82-artifacts')/Path(open('/tmp/s82-artifacts/backup_filename.txt').read().strip())
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          assert 'CREATE TABLE' in text
          digest=hashlib.sha256(p.read_bytes()).hexdigest()
          open('/tmp/s82-artifacts/backup-sha256.txt','w').write(digest)
          print('backup local verify OK bytes', p.stat().st_size, 'sha256', digest)
          PY

      - name: Apply migrations 033 and 034
        if: github.event_name != 'push' && github.event.inputs.confirm == 'MIGRATE_S82_033_034'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s82_migrate.php"
          code=$(curl -sS -o /tmp/s82-artifacts/migrate.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=migrate" || true)
          echo "migrate_http=$code"
          cat /tmp/s82-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          raw=open('/tmp/s82-artifacts/migrate.json').read().strip()
          if not raw:
            print('empty migrate response'); sys.exit(1)
          data=json.loads(raw)
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'skipped_apply': data.get('skipped_apply'),
            'already_applied': data.get('already_applied'),
            'applied': data.get('applied'),
            'skipped': data.get('skipped'),
            'schema_after': data.get('schema_after'),
            'error': data.get('error'),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_MIGRATE_OK':
            sys.exit(1)
          PY

      - name: Postcheck + business audit + bordro preflight + role matrix
        if: github.event_name == 'push' || github.event.inputs.confirm == 'MIGRATE_S82_033_034' || github.event.inputs.confirm == 'ACCEPT_S82_READONLY'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s82_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s82-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/postcheck.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_POSTCHECK_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=business_data_audit" | tee /tmp/s82-artifacts/business-data-audit.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/business-data-audit.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=bordro_preflight" | tee /tmp/s82-artifacts/bordro-preflight.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/bordro-preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'yil': data.get('yil'),
            'ay': data.get('ay'),
            'hesaplanabilir_mi': data.get('hesaplanabilir_mi'),
            'blocker_count': data.get('blocker_count'),
            'blocker_codes': data.get('blocker_codes'),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_BORDRO_PREFLIGHT_READONLY_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=role_matrix" | tee /tmp/s82-artifacts/role-matrix.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/role-matrix.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_ROLE_MATRIX_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s82-artifacts/integrity.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s82-artifacts/integrity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S82_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: HTTP smoke + unauthorized bordro matrix
        if: github.event_name == 'push' || github.event.inputs.confirm == 'MIGRATE_S82_033_034' || github.event.inputs.confirm == 'ACCEPT_S82_READONLY'
        run: |
          set -euo pipefail
          SMOKE_BASE_URL=https://www.karmotors.com.tr npm run smoke:live | tee /tmp/s82-artifacts/http-smoke.log
          for path in \
            "/personelmedisa/api/bordro-hazirlik/preflight?yil=2026&ay=1" \
            "/personelmedisa/api/sirket-calisma-politikalari" \
            "/personelmedisa/api/bordro-hazirlik/on-izleme?yil=2026&ay=1"
          do
            code=$(curl -sS -o /tmp/s82-artifacts/unauth.json -w "%{http_code}" "https://www.karmotors.com.tr${path}" || true)
            echo "unauth ${path} => ${code}"
            test "$code" = "401" || test "$code" = "403"
          done
          JS_HASH=$(curl -fsS https://www.karmotors.com.tr/personelmedisa/ | grep -oE '/personelmedisa/assets/index-[^"]+\.js' | head -n1)
          test -n "$JS_HASH"
          curl -fsSI "https://www.karmotors.com.tr${JS_HASH}" | tee /tmp/s82-artifacts/js-head.txt
          curl -fsS "https://www.karmotors.com.tr${JS_HASH}" | grep -q 'bordro-hazirlik' && echo "bundle contains bordro-hazirlik"

      - name: Delete ops files via FTP
        if: always() && (github.event_name == 'push' || github.event.inputs.confirm == 'MIGRATE_S82_033_034' || github.event.inputs.confirm == 'ACCEPT_S82_READONLY' || github.event.inputs.confirm == 'CLEANUP_S82')
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s82_migrate.php;
              rm -f 033_sirket_calisma_politikalari.sql;
              rm -f 034_bordro_onay_ve_projection.sql;
              rm -f s82_latest_backup_path.txt;
              bye
            "
          }
          cleanup false || cleanup true || true
          for mode in false true; do
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_s82_*.sql;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s82_migrate.php" || true)
          echo "post-delete HTTP=$code"
          test "$code" != "200"

      - name: Upload migrate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s82-live-schema-migrate
          path: /tmp/s82-artifacts
          if-no-files-found: warn
