name: Deploy cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_VERSION: 20
      LOCAL_DIST_DIR: ./dist/
      REMOTE_TARGET_DIR: ./public_html/personelmedisa/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate SPA rewrite file
        run: |
          test -f dist/.htaccess || (echo "dist/.htaccess missing. SPA routes will 404." && exit 1)

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER secret is missing." && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME secret is missing." && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD secret is missing." && exit 1)
          test -n "$FTP_PORT" || (echo "FTP_PORT secret is missing." && exit 1)

      - name: Install deploy client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload dist to cPanel public_html/personelmedisa
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          LOCAL_DIST_DIR: ${{ env.LOCAL_DIST_DIR }}
          REMOTE_TARGET_DIR: ${{ env.REMOTE_TARGET_DIR }}
        run: |
          set -euo pipefail

          deploy_with_protocol() {
            local protocol="$1"
            local use_ftps="$2"

            echo "Deploy protokolu deneniyor: ${protocol}"

            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "${protocol}://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 2;
              set net:timeout 20;
              set net:reconnect-interval-base 5;
              set xfer:clobber true;
              set ssl:verify-certificate no;
              set ftp:passive-mode true;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set sftp:auto-confirm yes;
              lcd ${LOCAL_DIST_DIR%/};
              mkdir -p ${REMOTE_TARGET_DIR%/};
              cd ${REMOTE_TARGET_DIR%/};
              mirror -R --delete --verbose . .;
              bye
            "
          }

          if [ "${FTP_PORT}" = "22" ]; then
            deploy_with_protocol "sftp" "false"
            exit 0
          fi

          if deploy_with_protocol "ftps" "true"; then
            exit 0
          fi

          echo "FTPS baglantisi basarisiz oldu, FTP fallback deneniyor..."
          deploy_with_protocol "ftp" "false"
