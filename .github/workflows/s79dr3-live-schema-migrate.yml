name: S79-D-R3 Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'MIGRATE_S79DR3_029 | SMOKE_S79DR3 | CLEANUP_S79DR3'
        required: true
        type: string

jobs:
  migrate:
    name: Preflight + backup + apply 029 + smoke via temporary FTP ops
    if: >
      github.event.inputs.confirm == 'MIGRATE_S79DR3_029' ||
      github.event.inputs.confirm == 'SMOKE_S79DR3' ||
      github.event.inputs.confirm == 'CLEANUP_S79DR3'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s79dr3-ops /tmp/s79dr3-artifacts
          cp api/migrations/029_serbest_zaman_events.sql /tmp/s79dr3-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s79dr3-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S79DR3_MIGRATE_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S79DR3_MIGRATE_TOKEN')}")
          out = src.replace('REPLACE_S79DR3_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s79dr3-ops/_s79dr3_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s79dr3-ops/_s79dr3_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S79DR3_MIGRATE_TOKEN" /tmp/s79dr3-ops/_s79dr3_migrate.php
          grep -q "$TOKEN" /tmp/s79dr3-ops/_s79dr3_migrate.php
          EXPECTED=d5ce98f03701ee9e13af4ad5b54490f0a9f01a1b7b35df0f9e17539f80009a8c
          ACTUAL=$(sha256sum api/migrations/029_serbest_zaman_events.sql | awk '{print $1}')
          echo "migration_sha256=$ACTUAL" | tee /tmp/s79dr3-artifacts/migration-sha256.txt
          test "$ACTUAL" = "$EXPECTED"
          ls -la /tmp/s79dr3-ops

      - name: Upload ops files via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local mode_name="$1"
            local use_ftps="$2"
            echo "FTP upload mode: ${mode_name}"
            timeout 90s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set cmd:verbose on;
              set net:max-retries 3;
              set net:timeout 20;
              set net:reconnect-interval-base 5;
              set net:reconnect-interval-max 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s79dr3-ops;
              put -O api/public _s79dr3_migrate.php;
              put -O api/public 029_serbest_zaman_events.sql;
              bye
            "
          }
          upload "plain-ftp" false || upload "explicit-ftps" true

      - name: Identity + preflight
        id: preflight
        if: github.event.inputs.confirm == 'MIGRATE_S79DR3_029'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          code=$(curl -sS -o /tmp/s79dr3-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s79dr3-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s79dr3-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s79dr3-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'already_applied': data.get('already_applied'),
            'counts': data.get('counts'),
          }, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          open('/tmp/s79dr3-artifacts/already_applied.txt','w').write('1' if data.get('already_applied') else '0')
          PY

      - name: Backup
        id: backup
        if: github.event.inputs.confirm == 'MIGRATE_S79DR3_029'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s79dr3-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup','counts')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          name=(data.get('backup') or {}).get('file') or 'karmotor_medisa_pre_029.sql'
          open('/tmp/s79dr3-artifacts/backup_filename.txt','w').write(name)
          PY
          FNAME="$(cat /tmp/s79dr3-artifacts/backup_filename.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s79dr3-artifacts/${FNAME}"
          ls -la "/tmp/s79dr3-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib
          p=Path('/tmp/s79dr3-artifacts')/Path(open('/tmp/s79dr3-artifacts/backup_filename.txt').read().strip())
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          assert 'CREATE TABLE' in text
          assert 'personeller' in text
          assert 'fazla_calisma_odeme_tercihleri' in text
          assert 'haftalik_kapanislar' in text
          assert 'INSERT INTO' in text or 'INSERT ' in text
          digest=hashlib.sha256(p.read_bytes()).hexdigest()
          open('/tmp/s79dr3-artifacts/backup-sha256.txt','w').write(digest)
          print('backup local verify OK bytes', p.stat().st_size, 'sha256', digest)
          PY

      - name: Apply migration 029
        id: migrate
        if: github.event.inputs.confirm == 'MIGRATE_S79DR3_029'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          code=$(curl -sS -o /tmp/s79dr3-artifacts/migrate.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=migrate" || true)
          echo "migrate_http=$code"
          cat /tmp/s79dr3-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          raw=open('/tmp/s79dr3-artifacts/migrate.json').read().strip()
          if not raw:
            print('empty migrate response'); sys.exit(1)
          data=json.loads(raw)
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'skipped_apply': data.get('skipped_apply'),
            'already_applied': data.get('already_applied'),
            'applied': data.get('applied'),
            'before_counts': data.get('before_counts'),
            'after_counts': data.get('after_counts'),
            'schema_issues': ((data.get('schema_match') or {}).get('issues')),
            'error': data.get('error'),
            'bad_tokens': data.get('bad_tokens'),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_MIGRATE_OK':
            sys.exit(1)
          PY

      - name: Postcheck + counts + integrity
        if: github.event.inputs.confirm == 'MIGRATE_S79DR3_029'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s79dr3-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/postcheck.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'counts': data.get('counts'),
            'issues': ((data.get('schema_match') or {}).get('issues')),
            'fk_count': len((data.get('schema_match') or {}).get('fks') or []),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_POSTCHECK_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=counts" | tee /tmp/s79dr3-artifacts/counts.json
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s79dr3-artifacts/integrity-pre-smoke.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/integrity-pre-smoke.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: Controlled smoke prepare + run + cleanup
        if: github.event.inputs.confirm == 'MIGRATE_S79DR3_029' || github.event.inputs.confirm == 'SMOKE_S79DR3'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s79dr3-artifacts/postcheck-before-smoke.json
          curl -fsS "${BASE}?token=${TOKEN}&action=counts" | tee /tmp/s79dr3-artifacts/counts-before-smoke.json
          curl -fsS "${BASE}?token=${TOKEN}&action=smoke_prepare" | tee /tmp/s79dr3-artifacts/smoke-prepare.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/smoke-prepare.json'))
          print(json.dumps(data, indent=2)[:4000])
          if not data.get('ok') or data.get('code') != 'S79_D_SMOKE_PREPARE_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=smoke_run" | tee /tmp/s79dr3-artifacts/smoke-run.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/smoke-run.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'failed_steps': [s for s in (data.get('steps') or []) if not s.get('ok')],
            'step_count': len(data.get('steps') or []),
            'login_note': data.get('login_note'),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_SMOKE_RUN_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=smoke_cleanup" | tee /tmp/s79dr3-artifacts/smoke-cleanup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/smoke-cleanup.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_SMOKE_CLEANUP_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s79dr3-artifacts/integrity-final.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/integrity-final.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: Cleanup-only smoke_cleanup
        if: github.event.inputs.confirm == 'CLEANUP_S79DR3'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=smoke_cleanup" | tee /tmp/s79dr3-artifacts/smoke-cleanup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/smoke-cleanup.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_SMOKE_CLEANUP_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s79dr3-artifacts/integrity-final.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79dr3-artifacts/integrity-final.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_D_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: Delete ops files via FTP
        if: always() && (github.event.inputs.confirm == 'MIGRATE_S79DR3_029' || github.event.inputs.confirm == 'SMOKE_S79DR3' || github.event.inputs.confirm == 'CLEANUP_S79DR3')
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s79dr3_migrate.php;
              rm -f 029_serbest_zaman_events.sql;
              rm -f s79dr3_latest_backup_path.txt;
              rm -f s79dr3_smoke_marker.json;
              bye
            "
          }
          cleanup false || cleanup true || true
          for mode in false true; do
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_029_*.sql;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s79dr3_migrate.php" || true)
          echo "post-delete HTTP=$code"
          test "$code" != "200"

      - name: Upload migrate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s79dr3-live-schema-migrate
          path: /tmp/s79dr3-artifacts
          if-no-files-found: warn
