name: S88-B Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "PREFLIGHT_BACKUP_S88B | MIGRATE_S88B_039 | CLEANUP_S88B"
        required: true
        type: string

jobs:
  migrate:
    name: S88-B live backup/migrate via temporary FTP ops
    if: >-
      github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S88B' ||
      github.event.inputs.confirm == 'MIGRATE_S88B_039' ||
      github.event.inputs.confirm == 'CLEANUP_S88B'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate migration 039 present
        if: github.event.inputs.confirm != 'CLEANUP_S88B'
        run: |
          set -euo pipefail
          test -f api/migrations/039_ubgt_gun_kapsami_tatil_takvimi.sql
          sha256sum api/migrations/039_ubgt_gun_kapsami_tatil_takvimi.sql
          echo "a803b757ff9ddeae29937bb6ee86f54e6064fd4499543b0240da788ae7eb2d73  api/migrations/039_ubgt_gun_kapsami_tatil_takvimi.sql" | sha256sum -c -

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        if: github.event.inputs.confirm != 'CLEANUP_S88B'
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s88b-ops /tmp/s88b-artifacts
          cp api/migrations/039_ubgt_gun_kapsami_tatil_takvimi.sql /tmp/s88b-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s88b-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S88B_MIGRATE_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S88B_MIGRATE_TOKEN')}")
          out = src.replace('REPLACE_S88B_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s88b-ops/_s88b_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s88b-ops/_s88b_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S88B_MIGRATE_TOKEN" /tmp/s88b-ops/_s88b_migrate.php
          grep -q "$TOKEN" /tmp/s88b-ops/_s88b_migrate.php
          sha256sum api/migrations/039_ubgt_gun_kapsami_tatil_takvimi.sql | tee /tmp/s88b-artifacts/migration-sha256.txt
          ls -la /tmp/s88b-ops

      - name: Upload ops files via FTP
        if: github.event.inputs.confirm != 'CLEANUP_S88B'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s88b-ops;
              put -O api/public _s88b_migrate.php;
              put -O api/public 039_ubgt_gun_kapsami_tatil_takvimi.sql;
              bye
            "
          }
          upload true || upload false

      - name: Identity + preflight
        if: github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S88B' || github.event.inputs.confirm == 'MIGRATE_S88B_039'
        id: preflight
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s88b_migrate.php"
          code=$(curl -sS -o /tmp/s88b-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s88b-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s88b-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s88b-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s88b-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s88b-artifacts/preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'already_applied': data.get('already_applied'),
            'fresh_apply_ready': (data.get('preflight') or {}).get('fresh_apply_ready'),
            'counts': (data.get('preflight') or {}).get('counts'),
          }, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          if data.get('code') == 'S88B_PREFLIGHT_PARTIAL_039_TRACE':
            sys.exit(2)
          open('/tmp/s88b-artifacts/already_applied.txt','w').write('1' if data.get('already_applied') else '0')
          pre = data.get('preflight') or {}
          counts = pre.get('counts') or {}
          open('/tmp/s88b-artifacts/before_personeller.txt','w').write(str(counts.get('personeller', '')))
          open('/tmp/s88b-artifacts/before_gunluk_puantaj.txt','w').write(str(counts.get('gunluk_puantaj', '')))
          open('/tmp/s88b-artifacts/before_muhur_satirlari.txt','w').write(str(counts.get('puantaj_aylik_muhur_satirlari', '')))
          PY
          if [ "${{ github.event.inputs.confirm }}" = "MIGRATE_S88B_039" ]; then
            if [ "$(cat /tmp/s88b-artifacts/already_applied.txt)" = "1" ]; then
              echo "039 already applied; refusing second apply" && exit 1
            fi
          fi

      - name: Backup + download
        if: github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S88B'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s88b_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s88b-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s88b-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          backup=data.get('backup') or {}
          if backup.get('method') not in ('mysqldump', 'php_sql_dump'):
            raise SystemExit(f"invalid backup method: {backup.get('method')}")
          name=backup.get('file') or 'karmotor_medisa_pre_039.sql'
          open('/tmp/s88b-artifacts/backup_filename.txt','w').write(name)
          open('/tmp/s88b-artifacts/backup_method.txt','w').write(str(backup.get('method') or ''))
          PY
          FNAME="$(cat /tmp/s88b-artifacts/backup_filename.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s88b-artifacts/${FNAME}"
          ls -la "/tmp/s88b-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib
          p=Path('/tmp/s88b-artifacts')/Path(open('/tmp/s88b-artifacts/backup_filename.txt').read().strip())
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          assert 'CREATE TABLE' in text
          assert 'INSERT INTO' in text
          assert 'personeller' in text.lower()
          assert 'gunluk_puantaj' in text.lower()
          assert ('COMMIT' in text) or ('Dump completed' in text)
          import re
          assert re.search(r'INSERT INTO [`"]?personeller[`"]?', text, re.I)
          assert re.search(r'INSERT INTO [`"]?gunluk_puantaj[`"]?', text, re.I)
          h=hashlib.sha256(p.read_bytes()).hexdigest()
          open('/tmp/s88b-artifacts/backup_sha256.txt','w').write(h)
          open('/tmp/s88b-artifacts/backup_bytes.txt','w').write(str(p.stat().st_size))
          print('backup verify OK method', open('/tmp/s88b-artifacts/backup_method.txt').read().strip())
          print('bytes', p.stat().st_size)
          print('sha256', h)
          print('create_table_count', text.upper().count('CREATE TABLE'))
          print('insert_count', text.upper().count('INSERT INTO'))
          PY

      - name: Apply migration 039
        if: github.event.inputs.confirm == 'MIGRATE_S88B_039'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s88b_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=migrate" | tee /tmp/s88b-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s88b-artifacts/migrate.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          after=data.get('after') or {}
          if after.get('resmi_tatil_takvimi') != 0 or after.get('resmi_tatil_takvim_auditleri') != 0:
            sys.exit(2)
          PY
          BEFORE_P="$(cat /tmp/s88b-artifacts/before_personeller.txt)"
          BEFORE_G="$(cat /tmp/s88b-artifacts/before_gunluk_puantaj.txt)"
          BEFORE_M="$(cat /tmp/s88b-artifacts/before_muhur_satirlari.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck&before_personeller=${BEFORE_P}&before_gunluk_puantaj=${BEFORE_G}&before_muhur_satirlari=${BEFORE_M}" | tee /tmp/s88b-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s88b-artifacts/postcheck.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY

      - name: Delete ops files via FTP
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s88b_migrate.php;
              rm -f 039_ubgt_gun_kapsami_tatil_takvimi.sql;
              rm -f s88b_latest_backup_path.txt;
              bye
            "
          }
          if [ "${{ github.event.inputs.confirm }}" != "" ]; then
            cleanup true || cleanup false
          fi
          for mode in true false; do
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_039_*.sql;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s88b_migrate.php" || true)
          echo "post-delete HTTP=$code"

      - name: Upload migrate artifacts
        if: always() && github.event.inputs.confirm != 'CLEANUP_S88B'
        uses: actions/upload-artifact@v4
        with:
          name: s88b-live-schema-migrate
          path: /tmp/s88b-artifacts
          if-no-files-found: warn
