name: S79-E-R3 Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'MIGRATE_S79ER3_030 | SMOKE_S79ER3 | CLEANUP_S79ER3'
        required: true
        type: string

jobs:
  migrate:
    name: Preflight + backup + apply 030 + smoke via temporary FTP ops
    if: >
      github.event.inputs.confirm == 'MIGRATE_S79ER3_030' ||
      github.event.inputs.confirm == 'SMOKE_S79ER3' ||
      github.event.inputs.confirm == 'CLEANUP_S79ER3'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s79er3-ops /tmp/s79er3-artifacts
          cp api/migrations/030_haftalik_kapanis_revizyon_talepleri.sql /tmp/s79er3-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s79er3-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S79ER3_MIGRATE_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S79ER3_MIGRATE_TOKEN')}")
          out = src.replace('REPLACE_S79ER3_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s79er3-ops/_s79er3_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s79er3-ops/_s79er3_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S79ER3_MIGRATE_TOKEN" /tmp/s79er3-ops/_s79er3_migrate.php
          grep -q "$TOKEN" /tmp/s79er3-ops/_s79er3_migrate.php
          EXPECTED=477e27b59e3cdfd8a3686a2dcd5a763f3db4d03d8fb388fc831bdc98a7a73e42
          ACTUAL=$(sha256sum api/migrations/030_haftalik_kapanis_revizyon_talepleri.sql | awk '{print $1}')
          echo "migration_sha256=$ACTUAL" | tee /tmp/s79er3-artifacts/migration-sha256.txt
          test "$ACTUAL" = "$EXPECTED"
          ls -la /tmp/s79er3-ops

      - name: Upload ops files via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local mode_name="$1"
            local use_ftps="$2"
            echo "FTP upload mode: ${mode_name}"
            timeout 90s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set cmd:verbose on;
              set net:max-retries 3;
              set net:timeout 20;
              set net:reconnect-interval-base 5;
              set net:reconnect-interval-max 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s79er3-ops;
              put -O api/public _s79er3_migrate.php;
              put -O api/public 030_haftalik_kapanis_revizyon_talepleri.sql;
              bye
            "
          }
          upload "plain-ftp" false || upload "explicit-ftps" true

      - name: Identity + preflight
        id: preflight
        if: github.event.inputs.confirm == 'MIGRATE_S79ER3_030'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          code=$(curl -sS -o /tmp/s79er3-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s79er3-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s79er3-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s79er3-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'already_applied': data.get('already_applied'),
            'counts': data.get('counts'),
          }, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          open('/tmp/s79er3-artifacts/already_applied.txt','w').write('1' if data.get('already_applied') else '0')
          PY

      - name: Backup
        id: backup
        if: github.event.inputs.confirm == 'MIGRATE_S79ER3_030'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s79er3-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup','counts')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          name=(data.get('backup') or {}).get('file') or 'karmotor_medisa_pre_030.sql'
          open('/tmp/s79er3-artifacts/backup_filename.txt','w').write(name)
          PY
          FNAME="$(cat /tmp/s79er3-artifacts/backup_filename.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s79er3-artifacts/${FNAME}"
          ls -la "/tmp/s79er3-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib
          p=Path('/tmp/s79er3-artifacts')/Path(open('/tmp/s79er3-artifacts/backup_filename.txt').read().strip())
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          assert 'CREATE TABLE' in text
          assert 'personeller' in text
          assert 'haftalik_kapanislar' in text
          assert 'haftalik_kapanis_satirlari' in text
          assert 'serbest_zaman_events' in text
          assert 'INSERT INTO' in text or 'INSERT ' in text
          assert 'COMMIT' in text or 'Dump completed' in text
          digest=hashlib.sha256(p.read_bytes()).hexdigest()
          open('/tmp/s79er3-artifacts/backup-sha256.txt','w').write(digest)
          print('backup local verify OK bytes', p.stat().st_size, 'sha256', digest)
          PY

      - name: Apply migration 030
        id: migrate
        if: github.event.inputs.confirm == 'MIGRATE_S79ER3_030'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          code=$(curl -sS -o /tmp/s79er3-artifacts/migrate.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=migrate" || true)
          echo "migrate_http=$code"
          cat /tmp/s79er3-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          raw=open('/tmp/s79er3-artifacts/migrate.json').read().strip()
          if not raw:
            print('empty migrate response'); sys.exit(1)
          data=json.loads(raw)
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'skipped_apply': data.get('skipped_apply'),
            'already_applied': data.get('already_applied'),
            'applied': data.get('applied'),
            'before_counts': data.get('before_counts'),
            'after_counts': data.get('after_counts'),
            'schema_issues': ((data.get('schema_match') or {}).get('issues')),
            'error': data.get('error'),
            'bad_tokens': data.get('bad_tokens'),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_MIGRATE_OK':
            sys.exit(1)
          PY

      - name: Postcheck + counts + integrity
        if: github.event.inputs.confirm == 'MIGRATE_S79ER3_030'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s79er3-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/postcheck.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'counts': data.get('counts'),
            'issues': ((data.get('schema_match') or {}).get('issues')),
            'fk_count': len((data.get('schema_match') or {}).get('fks') or []),
          }, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_POSTCHECK_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=counts" | tee /tmp/s79er3-artifacts/counts.json
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s79er3-artifacts/integrity-pre-smoke.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/integrity-pre-smoke.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: Controlled smoke prepare + run + cleanup
        if: github.event.inputs.confirm == 'MIGRATE_S79ER3_030' || github.event.inputs.confirm == 'SMOKE_S79ER3'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          curl -sS "${BASE}?token=${TOKEN}&action=postcheck" | tee /tmp/s79er3-artifacts/postcheck-before-smoke.json >/dev/null
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/postcheck-before-smoke.json'))
          if not data.get('ok') or data.get('code') != 'S79_E_POSTCHECK_OK':
            print(json.dumps(data, indent=2)[:2000]); sys.exit(1)
          PY
          curl -sS "${BASE}?token=${TOKEN}&action=counts" | tee /tmp/s79er3-artifacts/counts-before-smoke.json >/dev/null
          code=$(curl -sS -o /tmp/s79er3-artifacts/smoke-prepare.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=smoke_prepare" || true)
          echo "smoke_prepare_http=$code"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/smoke-prepare.json'))
          redacted=dict(data)
          if 'fixture' in redacted and isinstance(redacted['fixture'], dict):
            redacted['fixture'].pop('tokens', None)
          print(json.dumps(redacted, indent=2)[:4000])
          if not data.get('ok') or data.get('code') != 'S79_E_SMOKE_PREPARE_OK':
            sys.exit(1)
          if 'tokens' in data:
            print('ERROR: tokens leaked in smoke_prepare response'); sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s79er3-artifacts/smoke-run.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=smoke_run" || true)
          echo "smoke_run_http=$code"
          SMOKE_RUN_OK=0
          python3 - <<'PY'
          import json,sys,os
          data=json.load(open('/tmp/s79er3-artifacts/smoke-run.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'failed_steps': [s for s in (data.get('steps') or []) if not s.get('ok')],
            'step_count': len(data.get('steps') or []),
            'login_note': data.get('login_note'),
          }, indent=2))
          if 'tokens' in data:
            print('ERROR: tokens leaked in smoke_run response'); sys.exit(1)
          if data.get('ok') and data.get('code') == 'S79_E_SMOKE_RUN_OK':
            open('/tmp/s79er3-artifacts/smoke_run_ok.flag','w').write('1')
          else:
            open('/tmp/s79er3-artifacts/smoke_run_ok.flag','w').write('0')
          PY
          SMOKE_RUN_OK=$(cat /tmp/s79er3-artifacts/smoke_run_ok.flag)
          # Always cleanup fixtures even if smoke_run failed (markerless rediscovery supported).
          code=$(curl -sS -o /tmp/s79er3-artifacts/smoke-cleanup.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=smoke_cleanup" || true)
          echo "smoke_cleanup_http=$code"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/smoke-cleanup.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_SMOKE_CLEANUP_OK':
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s79er3-artifacts/integrity-final.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=integrity" || true)
          echo "integrity_final_http=$code"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/integrity-final.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY
          if [ "${SMOKE_RUN_OK:-0}" != "1" ]; then
            echo "smoke_run failed earlier; cleanup/integrity completed"
            exit 1
          fi

      - name: Cleanup-only smoke_cleanup
        if: github.event.inputs.confirm == 'CLEANUP_S79ER3'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=smoke_cleanup" | tee /tmp/s79er3-artifacts/smoke-cleanup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/smoke-cleanup.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_SMOKE_CLEANUP_OK':
            sys.exit(1)
          PY
          curl -fsS "${BASE}?token=${TOKEN}&action=integrity" | tee /tmp/s79er3-artifacts/integrity-final.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s79er3-artifacts/integrity-final.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok') or data.get('code') != 'S79_E_FINAL_INTEGRITY_OK':
            sys.exit(1)
          PY

      - name: Delete ops files via FTP
        if: always() && (github.event.inputs.confirm == 'MIGRATE_S79ER3_030' || github.event.inputs.confirm == 'SMOKE_S79ER3' || github.event.inputs.confirm == 'CLEANUP_S79ER3')
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s79er3_migrate.php;
              rm -f 030_haftalik_kapanis_revizyon_talepleri.sql;
              rm -f s79er3_latest_backup_path.txt;
              rm -f s79er3_smoke_marker.json;
              bye
            "
          }
          cleanup false || cleanup true || true
          for mode in false true; do
            timeout 60s lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:timeout 15;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_030_*.sql;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s79er3_migrate.php" || true)
          echo "post-delete HTTP=$code"
          test "$code" != "200"

      - name: Upload migrate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s79er3-live-schema-migrate
          path: /tmp/s79er3-artifacts
          if-no-files-found: warn
