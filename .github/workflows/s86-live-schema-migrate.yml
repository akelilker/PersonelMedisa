name: S86 Live Schema Migrate

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "PREFLIGHT_BACKUP_S86 | MIGRATE_S86_038 | STORAGE_CONFIGURE_S86 | STORAGE_PROBE_S86 | CLEANUP_S86"
        required: true
        type: string

jobs:
  migrate:
    name: S86 live backup/migrate/storage via temporary FTP ops
    if: >-
      github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S86' ||
      github.event.inputs.confirm == 'MIGRATE_S86_038' ||
      github.event.inputs.confirm == 'STORAGE_CONFIGURE_S86' ||
      github.event.inputs.confirm == 'STORAGE_PROBE_S86' ||
      github.event.inputs.confirm == 'CLEANUP_S86'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Validate migration 038 present
        if: github.event.inputs.confirm != 'CLEANUP_S86'
        run: |
          set -euo pipefail
          test -f api/migrations/038_personel_belge_yonetimi.sql
          sha256sum api/migrations/038_personel_belge_yonetimi.sql

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER missing" && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME missing" && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD missing" && exit 1)
          test "${FTP_PORT}" = "21" || (echo "FTP_PORT must be 21" && exit 1)

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare one-shot ops payload
        if: github.event.inputs.confirm != 'CLEANUP_S86'
        id: prep
        run: |
          set -euo pipefail
          TOKEN="$(openssl rand -hex 24)"
          export TOKEN
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          mkdir -p /tmp/s86-ops /tmp/s86-artifacts
          cp api/migrations/038_personel_belge_yonetimi.sql /tmp/s86-ops/
          python3 - <<'PY'
          from pathlib import Path
          import os
          src = Path('scripts/s86-live-migrate.php').read_text(encoding='utf-8')
          token = os.environ['TOKEN']
          if src.count('REPLACE_S86_MIGRATE_TOKEN') != 1:
              raise SystemExit(f"expected exactly 1 REPLACE placeholder, got {src.count('REPLACE_S86_MIGRATE_TOKEN')}")
          out = src.replace('REPLACE_S86_MIGRATE_TOKEN', token, 1)
          Path('/tmp/s86-ops/_s86_migrate.php').write_text(out, encoding='utf-8', newline='\n')
          print('token_injected_ok')
          PY
          if head -c 3 /tmp/s86-ops/_s86_migrate.php | grep -q $'\xEF\xBB\xBF'; then
            echo "BOM detected" && exit 1
          fi
          grep -q "UNSET_S86_MIGRATE_TOKEN" /tmp/s86-ops/_s86_migrate.php
          grep -q "$TOKEN" /tmp/s86-ops/_s86_migrate.php
          sha256sum api/migrations/038_personel_belge_yonetimi.sql | tee /tmp/s86-artifacts/migration-sha256.txt
          ls -la /tmp/s86-ops

      - name: Upload ops files via FTP
        if: github.event.inputs.confirm != 'CLEANUP_S86'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          upload() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set net:max-retries 5;
              set net:timeout 30;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd .;
              mkdir -p api/public;
              lcd /tmp/s86-ops;
              put -O api/public _s86_migrate.php;
              put -O api/public 038_personel_belge_yonetimi.sql;
              bye
            "
          }
          upload true || upload false

      - name: Identity + preflight
        if: github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S86' || github.event.inputs.confirm == 'MIGRATE_S86_038'
        id: preflight
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php"
          code=$(curl -sS -o /tmp/s86-artifacts/identity.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=identity" || true)
          echo "identity_http=$code"
          cat /tmp/s86-artifacts/identity.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/identity.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s86-artifacts/preflight.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=preflight" || true)
          echo "preflight_http=$code"
          cat /tmp/s86-artifacts/preflight.json
          echo
          test "$code" = "200"
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/preflight.json'))
          print(json.dumps({
            'ok': data.get('ok'),
            'code': data.get('code'),
            'already_applied': data.get('already_applied'),
            'sgk_manifest': (data.get('preflight') or {}).get('sgk_kaynak_manifestleri_exists'),
            'fresh_apply_ready': (data.get('preflight') or {}).get('fresh_apply_ready'),
          }, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          if data.get('code') == 'S86_PREFLIGHT_PARTIAL_038_TRACE':
            sys.exit(2)
          open('/tmp/s86-artifacts/already_applied.txt','w').write('1' if data.get('already_applied') else '0')
          pre = data.get('preflight') or {}
          counts = pre.get('counts') or {}
          open('/tmp/s86-artifacts/before_personeller.txt','w').write(str(counts.get('personeller', '')))
          open('/tmp/s86-artifacts/before_surecler.txt','w').write(str(counts.get('surecler', '')))
          PY
          if [ "${{ github.event.inputs.confirm }}" = "MIGRATE_S86_038" ]; then
            if [ "$(cat /tmp/s86-artifacts/already_applied.txt)" = "1" ]; then
              echo "038 already applied; refusing migrate" && exit 1
            fi
          fi

      - name: Backup + download
        if: github.event.inputs.confirm == 'PREFLIGHT_BACKUP_S86'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=backup" | tee /tmp/s86-artifacts/backup.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/backup.json'))
          print(json.dumps({k:data.get(k) for k in ('ok','code','backup')}, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          name=(data.get('backup') or {}).get('file') or 'karmotor_medisa_pre_038.sql'
          open('/tmp/s86-artifacts/backup_filename.txt','w').write(name)
          method=(data.get('backup') or {}).get('method')
          open('/tmp/s86-artifacts/backup_method.txt','w').write(str(method or ''))
          # Prefer embedded inventory when present (avoids fragile HTTP download of large dumps).
          inv=data.get('inventory')
          if isinstance(inv, dict) and method == 'inventory_json':
              import json as _json
              from pathlib import Path
              out=Path('/tmp/s86-artifacts')/name
              out.write_text(_json.dumps(inv, ensure_ascii=False, indent=2), encoding='utf-8')
              print('embedded inventory written bytes', out.stat().st_size)
          PY
          FNAME="$(cat /tmp/s86-artifacts/backup_filename.txt)"
          if [ ! -s "/tmp/s86-artifacts/${FNAME}" ]; then
            curl -fsS "${BASE}?token=${TOKEN}&action=download_backup" -o "/tmp/s86-artifacts/${FNAME}" \
              || lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
                   set cmd:fail-exit true; set ssl:verify-certificate no; set ftp:passive-mode on;
                   set ftp:ssl-allow true; set ftp:ssl-force true; set ftp:ssl-protect-data true;
                   cd api/public; get ${FNAME} -o /tmp/s86-artifacts/${FNAME}; bye
                 " \
              || lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
                   set cmd:fail-exit true; set ssl:verify-certificate no; set ftp:passive-mode on;
                   set ftp:ssl-allow false; cd api/public; get ${FNAME} -o /tmp/s86-artifacts/${FNAME}; bye
                 "
          fi
          ls -la "/tmp/s86-artifacts/${FNAME}"
          python3 - <<PY
          from pathlib import Path
          import hashlib, json
          p=Path('/tmp/s86-artifacts')/Path(open('/tmp/s86-artifacts/backup_filename.txt').read().strip())
          method=open('/tmp/s86-artifacts/backup_method.txt').read().strip()
          text=p.read_text(encoding='utf-8', errors='replace')
          assert p.stat().st_size > 0
          if method == 'mysqldump':
              assert 'CREATE TABLE' in text
              assert 'INSERT INTO' in text
              print('backup verify OK mysqldump bytes', p.stat().st_size)
          elif method == 'inventory_json':
              payload=json.loads(text)
              assert payload.get('tables')
              assert payload.get('create_tables')
              assert payload.get('triggers') is not None
              assert payload.get('key_row_counts')
              print('backup verify OK inventory_json tables', len(payload.get('tables') or []), 'key_counts', payload.get('key_row_counts'))
          else:
              raise SystemExit(f'unknown backup method: {method}')
          h=hashlib.sha256(p.read_bytes()).hexdigest()
          open('/tmp/s86-artifacts/backup_sha256.txt','w').write(h)
          print('backup sha256', h)
          PY

      - name: Apply migration 038
        if: github.event.inputs.confirm == 'MIGRATE_S86_038'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php"
          curl -fsS "${BASE}?token=${TOKEN}&action=migrate" | tee /tmp/s86-artifacts/migrate.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/migrate.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          new=data.get('new_table_row_counts') or {}
          if new.get('personel_belge_dosya_surumleri') != 0 or new.get('personel_belge_auditleri') != 0:
            sys.exit(2)
          PY
          BEFORE_P="$(cat /tmp/s86-artifacts/before_personeller.txt)"
          BEFORE_S="$(cat /tmp/s86-artifacts/before_surecler.txt)"
          curl -fsS "${BASE}?token=${TOKEN}&action=postcheck&before_personeller=${BEFORE_P}&before_surecler=${BEFORE_S}" | tee /tmp/s86-artifacts/postcheck.json
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/postcheck.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY

      - name: Storage configure + probe
        if: github.event.inputs.confirm == 'STORAGE_CONFIGURE_S86'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php"
          code=$(curl -sS -o /tmp/s86-artifacts/storage_diag.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=storage_diag" || true)
          echo "storage_diag_http=$code"
          cat /tmp/s86-artifacts/storage_diag.json
          echo
          code=$(curl -sS -o /tmp/s86-artifacts/storage_configure.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=storage_configure&confirm=SET_RECOMMENDED_ROOT" || true)
          echo "storage_configure_http=$code"
          cat /tmp/s86-artifacts/storage_configure.json
          echo
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/storage_configure.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY
          code=$(curl -sS -o /tmp/s86-artifacts/storage_probe.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=storage_probe" || true)
          echo "storage_probe_http=$code"
          cat /tmp/s86-artifacts/storage_probe.json
          echo
          python3 - <<'PY'
          import json,sys
          data=json.load(open('/tmp/s86-artifacts/storage_probe.json'))
          print(json.dumps(data, indent=2))
          if not data.get('ok'):
            sys.exit(1)
          PY

      - name: Storage probe
        if: github.event.inputs.confirm == 'STORAGE_PROBE_S86'
        env:
          TOKEN: ${{ steps.prep.outputs.token }}
        run: |
          set -euo pipefail
          BASE="https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php"
          code=$(curl -sS -o /tmp/s86-artifacts/storage_probe.json -w "%{http_code}" "${BASE}?token=${TOKEN}&action=storage_probe" || true)
          echo "storage_probe_http=$code"
          cat /tmp/s86-artifacts/storage_probe.json
          echo
          python3 - <<'PY'
          import json
          data=json.load(open('/tmp/s86-artifacts/storage_probe.json'))
          print(json.dumps(data, indent=2))
          PY

      - name: Delete ops files via FTP
        if: always()
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          cleanup() {
            local use_ftps="$1"
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set net:max-retries 3;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              cd api/public;
              rm -f _s86_migrate.php;
              rm -f 038_personel_belge_yonetimi.sql;
              rm -f s86_latest_backup_path.txt;
              bye
            "
          }
          if [ "${{ github.event.inputs.confirm }}" != "" ]; then
            cleanup true || cleanup false
          fi
          for mode in true false; do
            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit false;
              set ssl:verify-certificate no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${mode};
              set ftp:ssl-force ${mode};
              set ftp:ssl-protect-data ${mode};
              cd api/public;
              glob rm karmotor_medisa_pre_038_*.sql;
              glob rm karmotor_medisa_pre_038_*.json;
              bye
            " || true
          done
          code=$(curl -sS -o /tmp/gone.txt -w "%{http_code}" "https://www.karmotors.com.tr/personelmedisa/api/public/_s86_migrate.php" || true)
          echo "post-delete HTTP=$code"

      - name: Upload migrate artifacts
        if: always() && github.event.inputs.confirm != 'CLEANUP_S86'
        uses: actions/upload-artifact@v4
        with:
          name: s86-live-schema-migrate
          path: /tmp/s86-artifacts
          if-no-files-found: warn
