name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Unit + Typecheck + Build
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: medisa_ci_root_pw
          MARIADB_DATABASE: medisa_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
          --health-start-period=30s

    env:
      MEDISA_TEST_MYSQL_DSN: "mysql:host=127.0.0.1;port=3306;dbname=medisa_ci;charset=utf8mb4"
      MEDISA_TEST_MYSQL_USER: root
      MEDISA_TEST_MYSQL_PASSWORD: medisa_ci_root_pw

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, mysqli
          coverage: none

      - name: Install dependencies
        run: npm ci

      - name: Wait for MariaDB and print version
        run: |
          php -r '
            $dsn = getenv("MEDISA_TEST_MYSQL_DSN");
            $user = getenv("MEDISA_TEST_MYSQL_USER");
            $pass = getenv("MEDISA_TEST_MYSQL_PASSWORD");
            $lastError = "";
            for ($i = 0; $i < 30; $i++) {
              try {
                $pdo = new PDO($dsn, $user, $pass, [PDO::ATTR_ERRMODE => PDO::ERRMODE_EXCEPTION]);
                $version = $pdo->query("SELECT VERSION()")->fetchColumn();
                $one = $pdo->query("SELECT 1")->fetchColumn();
                echo "MariaDB ready: version=" . $version . " select1=" . $one . PHP_EOL;
                exit(0);
              } catch (Throwable $e) {
                $lastError = $e->getMessage();
                sleep(2);
              }
            }
            fwrite(STDERR, "MariaDB readiness failed: " . $lastError . PHP_EOL);
            exit(1);
          '

      - name: Run API parity gate
        run: npm run check:api-parity

      - name: Run type check
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm run test

      - name: Run build
        run: npm run build

  s80-e2e:
    name: S80 Revizyon Merkezi E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run S80 Revizyon Merkezi Playwright
        run: npm run e2e:s80

  s81-e2e:
    name: S81 Bildirim ve Onay Zinciri E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run S81 Bildirim ve Onay Zinciri Playwright
        run: npm run e2e:s81

  s82-e2e:
    name: S82 Bordro Hazirlik Merkezi E2E
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run S82 Bordro Hazirlik Merkezi Playwright
        run: npm run e2e:s82
