name: Deploy cPanel

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and upload
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_VERSION: 24
      LOCAL_DIST_DIR: ./dist/
      LOCAL_REPO_DIR: ${{ github.workspace }}
      REMOTE_TARGET_DIR: .
    steps:
      - name: Checkout tested commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout manual dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_APP_BASE_PATH: /personelmedisa/
        run: npm run build

      - name: Validate SPA rewrite file
        run: |
          test -f dist/.htaccess || (echo "dist/.htaccess missing. SPA routes will 404." && exit 1)

      - name: Validate PHP API deploy files
        run: |
          test -f api/.htaccess || (echo "api/.htaccess missing." && exit 1)
          test -f api/public/index.php || (echo "api/public/index.php missing." && exit 1)
          test -f api/src/Router.php || (echo "api/src/Router.php missing." && exit 1)
          test ! -f api/config.local.php || (echo "api/config.local.php must not be committed or deployed from repo." && exit 1)

      - name: Validate deploy secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          test -n "$FTP_SERVER" || (echo "FTP_SERVER secret is missing." && exit 1)
          test -n "$FTP_USERNAME" || (echo "FTP_USERNAME secret is missing." && exit 1)
          test -n "$FTP_PASSWORD" || (echo "FTP_PASSWORD secret is missing." && exit 1)
          test -n "$FTP_PORT" || (echo "FTP_PORT secret is missing." && exit 1)
          test "$FTP_PORT" = "21" || (echo "FTP_PORT must be 21 for this cPanel FTP deploy." && exit 1)

      - name: Install deploy client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Upload dist and PHP API to cPanel personelmedisa FTP root
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          LOCAL_DIST_DIR: ${{ env.LOCAL_DIST_DIR }}
          LOCAL_REPO_DIR: ${{ env.LOCAL_REPO_DIR }}
          REMOTE_TARGET_DIR: ${{ env.REMOTE_TARGET_DIR }}
        run: |
          set -euo pipefail

          deploy_with_ftp_mode() {
            local mode_name="$1"
            local use_ftps="$2"

            echo "Deploy modu deneniyor: ${mode_name}"

            lftp -u "${FTP_USERNAME}","${FTP_PASSWORD}" -p "${FTP_PORT}" "ftp://${FTP_SERVER}" -e "
              set cmd:fail-exit true;
              set cmd:verbose on;
              set net:max-retries 5;
              set net:timeout 30;
              set net:reconnect-interval-base 10;
              set net:reconnect-interval-max 30;
              set xfer:clobber true;
              set ssl:verify-certificate no;
              set ssl:check-hostname no;
              set ftp:passive-mode on;
              set ftp:ssl-allow ${use_ftps};
              set ftp:ssl-force ${use_ftps};
              set ftp:ssl-protect-data ${use_ftps};
              lcd ${LOCAL_DIST_DIR%/};
              !echo 'FTP root hedefleniyor';
              cd ${REMOTE_TARGET_DIR};
              !echo 'SPA dist upload basliyor';
              mirror -R --delete --verbose --exclude api/ . .;
              !echo 'PHP API upload basliyor';
              lcd ${LOCAL_REPO_DIR};
              mkdir -p api;
              put -O api api/.htaccess;
              mirror -R --verbose api/public api/public;
              mirror -R --verbose api/src api/src;
              !echo 'upload tamamlandi';
              bye
            "
          }

          echo "Explicit FTPS port 21 deneniyor..."
          if deploy_with_ftp_mode "explicit-ftps" "true"; then
            exit 0
          fi

          echo "Explicit FTPS basarisiz oldu, plain FTP fallback deneniyor..."
          deploy_with_ftp_mode "plain-ftp" "false"
